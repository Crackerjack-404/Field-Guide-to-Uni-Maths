name: Build LaTeX PDF

on:
  push:
    branches: [ main ]

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_lualatex: true

      - name: Move PDF
        run: |
          mkdir -p assets/pdf
          mv main.pdf assets/pdf/field-guide.pdf

      - name: Commit updated PDF
        run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com
          git add assets/pdf/field-guide.pdf
          git commit -m "Update compiled PDF" || echo "No changes"
          git push
