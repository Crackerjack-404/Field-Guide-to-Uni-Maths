project:
  type: book
  output-dir: docs
  resources:
    - pdf
  
book:
  navbar:
    right:
      - text: Download PDF
        href: pdf/field-guide.pdf
  title: "Field Guide to Mathematics at University"
  author: "First Year Student 25/26"

  chapters:
    - index.qmd
    - chapters/01-jump.qmd
    - chapters/02-lectures.qmd
    - chapters/03-workshops.qmd
    - chapters/04-problem-solving.qmd
    - chapters/05-exams.qmd
    - chapters/06-time-management.qmd
    - chapters/07-future.qmd
    - chapters/08-useful-links.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    include-in-header:
      - text: |
          <script src="progress.js"></script>
    toc: true
    search: true
    number-sections: true
    respect-user-color-scheme: true
    toggle: true
    page-navigation: true
    date: last-modified
